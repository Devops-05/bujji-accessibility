name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: gradle wrapper
      - run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: bujji-access
          path: app/build/outputs/apk/debug/app-debug.apk